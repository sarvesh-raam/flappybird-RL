<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy RL | Hyper-Sync Arena</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Precision Canvas Styling */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            height: 480px;
            background: #4ec0ca;
            /* Classic Flappy Blue */
            border-radius: 12px;
            overflow: hidden;
            display: flex;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .v-split {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: rgba(255, 255, 255, 0.4);
            z-index: 5;
            transform: translateX(-50%);
        }

        .arena-labels {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 6;
        }
    </style>
</head>

<body data-theme="dark">
    <div id="name-screen" class="modal-overlay">
        <div class="modal-card glass">
            <h2>WELCOME PILOT</h2>
            <p>Enter your callsign to challenge the AI</p>
            <input type="text" id="player-name-input" placeholder="YOUR NAME" maxlength="12">
            <button id="start-btn">ENTER ARENA</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>FLAPPY <span class="accent">RL</span> <span
                    style="font-size: 0.6em; vertical-align: middle; background: #ff4757; padding: 2px 8px; border-radius: 4px;">v6.0
                    HYPER-SYNC</span></h1>
            <p class="subtitle">Real-time Human vs AI Tournament</p>
        </header>

        <main class="dashboard">
            <div class="main-display">
                <div class="game-console glass">
                    <div class="canvas-wrapper">
                        <canvas id="game-canvas"></canvas>
                        <div class="v-split"></div>
                        <div class="arena-labels">
                            <span id="label-human">HUMAN</span>
                            <span>AI BIRD</span>
                        </div>
                        <div id="overlay" class="overlay">
                            <div class="overlay-card glass">
                                <h2 id="overlay-title">READY?</h2>
                                <p id="overlay-msg">PRESS SPACE TO BATTLE</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="side-panel">
                <div class="stats-panel">
                    <div class="stat-card card glass green">
                        <h3><span id="player-name-display">YOU</span></h3>
                        <div id="score-h" class="big-num">0</div>
                        <p>BEST: <span id="best-h">0</span></p>
                    </div>
                    <div class="stat-card card glass blue">
                        <h3>AI AGENT</h3>
                        <div id="score-a" class="big-num">0</div>
                        <p>BEST: <span id="best-a">0</span></p>
                    </div>
                </div>

                <div class="leaderboard card glass">
                    <h3>🏆 TOP PILOTS</h3>
                    <div id="leaderboard-list"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
