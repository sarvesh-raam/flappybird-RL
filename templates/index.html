<!DOCTYPE html>
<html>

<head>
    <title>Phoenix v13 | Official Python Engine</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .arena-box {
            position: relative;
            border: 3px solid #444;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        #stream {
            display: block;
            max-width: 95vw;
            max-height: 75vh;
        }

        .stats-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 15px;
            font-size: 28px;
            font-weight: 800;
            background: #222;
            margin-bottom: 2px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #2ecc71;
            z-index: 10;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .best {
            font-size: 14px;
            color: #aaa;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="stats-bar">
        <div>YOU: <span id="sh">0</span>
            <div class="best">BEST: <span id="bh">0</span></div>
        </div>
        <div style="color: #2ecc71;">AI BRAIN: <span id="sa">0</span>
            <div class="best">BEST: <span id="ba">0</span></div>
        </div>
    </div>

    <div class="arena-box">
        <img id="stream" src="/stream" alt="Loading Stream...">
        <div id="msg" class="overlay">
            <h1>READY?</h1>
            <p>SPACE OR CLICK TO FLY</p>
        </div>
    </div>

    <script>
        const sh = document.getElementById('sh'); const bh = document.getElementById('bh');
        const sa = document.getElementById('sa'); const ba = document.getElementById('ba');
        const msg = document.getElementById('msg');

        const flap = () => fetch('/f');

        window.onkeydown = (e) => {
            if (e.code === 'Space') { e.preventDefault(); flap(); }
        };
        msg.onclick = flap;

        setInterval(async () => {
            try {
                const res = await fetch('/stats');
                const d = await res.json();
                sh.innerText = d.sh; bh.innerText = d.bh;
                sa.innerText = d.sa; ba.innerText = d.ba;

                if (!d.run || d.dh) {
                    msg.classList.remove('hidden');
                    if (d.dh) msg.querySelector('h1').innerText = "CRASHED!";
                } else {
                    msg.classList.add('hidden');
                }
            } catch (e) { }
        }, 50);
    </script>
</body>

</html>
