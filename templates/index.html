<!DOCTYPE html>
<html>

<head>
    <title>Phoenix RL | Pure Python</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .arena {
            position: relative;
            border: 4px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            background: #000;
        }

        img {
            display: block;
            max-width: 100vw;
            max-height: 80vh;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 25%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #2ecc71;
        }

        .scores {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="scores">
        <div>HUMAN: <span id="sh">0</span></div>
        <div style="color: #2ecc71;">AI BRAIN: <span id="sa">0</span></div>
    </div>

    <div class="arena">
        <img src="/video" alt="Game Stream">
        <div id="msg" class="overlay">
            <h2>READY?</h2>
            <p>SPACE TO FLY</p>
        </div>
    </div>

    <script>
        const sh = document.getElementById('sh');
        const sa = document.getElementById('sa');
        const msg = document.getElementById('msg');

        // Instant Flap
        window.onkeydown = (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                fetch('/flap');
            }
        };

        // Stats UI loop
        setInterval(async () => {
            try {
                const res = await fetch('/stats');
                const d = await res.json();
                sh.innerText = d.score_h;
                sa.innerText = d.score_a;

                if (!d.running || d.done_h) {
                    msg.classList.remove('hidden');
                    if (d.done_h) msg.querySelector('h2').innerText = "CRASHED!";
                } else {
                    msg.classList.add('hidden');
                }
            } catch (e) { }
        }, 100);
    </script>
</body>

</html>
