name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Remove Binary Files for Push
        run: |
          # We remove binary files here only for the HF sync
          # This prevents the "Your push was rejected because it contains binary files" error
          rm -f *.zip
          rm -rf legacy_models/
          git config --global user.email "sync-bot@example.com"
          git config --global user.name "Sync Bot"
          git add .
          git commit -m "Internal: Stripping binaries for HF compatibility" || echo "No changes to commit"

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://sarveshraam:$HF_TOKEN@huggingface.co/spaces/sarveshraam/flappybird-rl main
