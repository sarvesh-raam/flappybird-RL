name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Create Clean Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Create a temporary folder for the clean version
          mkdir deploy_folder
          
          # 2. Copy everything EXCEPT the large binaries and the .git folder
          # This creates a "pure code" version of your project
          rsync -rv --exclude '.git' --exclude '*.zip' --exclude 'legacy_models/' ./ deploy_folder/
          
          # 3. Initialize a BRAND NEW git repo in that folder
          cd deploy_folder
          git init
          git config --global user.email "sync-bot@example.com"
          git config --global user.name "Sync Bot"
          git add .
          git commit -m "Clean deployment sync"
          
          # 4. Push this "Zero History" version to Hugging Face
          git push --force https://sarveshraam:$HF_TOKEN@huggingface.co/spaces/sarveshraam/flappybird-rl HEAD:main
