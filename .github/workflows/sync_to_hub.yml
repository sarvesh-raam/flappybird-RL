name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Sync with Preservation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "sync-bot@example.com"
          git config --global user.name "Sync Bot"
          
          # Clone existing HF space state (preserves any large files already there)
          git clone https://sarveshraam:$HF_TOKEN@huggingface.co/spaces/sarveshraam/flappybird-rl hf_space
          
          # Copy code + AI model (it's only 0.4MB, safe to include!)
          cp -rv app.py requirements.txt Dockerfile LICENSE README.md hf_space/
          cp -rv templates/ hf_space/ 2>/dev/null || true
          cp -rv static/ hf_space/ 2>/dev/null || true
          # Copy the AI model zip if it exists in the repo
          cp -v *.zip hf_space/ 2>/dev/null || echo "No zip files in repo"
          
          # Commit and push only if something changed
          cd hf_space
          git add .
          git diff-index --quiet HEAD || (git commit -m "Update code + AI model" && git push origin main)

